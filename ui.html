<style>
  body { background: #1e1e1e; color: #fff; font-family: monospace; padding: 12px; margin: 0; display: flex; flex-direction: column; height: 100%; }
  textarea { flex-grow: 1; background: #000; color: #0f0; border: 1px solid #333; padding: 8px; resize: none; margin-bottom: 8px; outline: none; }
  button { background: #333; color: white; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
  button:hover { background: #444; }
  .label { font-size: 10px; color: #888; margin-bottom: 4px; }
</style>

<div class="label">FIGMA.EXE > READY_</div>
<textarea id="code" placeholder="// Paste Lore recipe here..."></textarea>
<button id="run">EXECUTE_COMMAND</button>

<script>
  document.getElementById('run').onclick = () => {
    const code = document.getElementById('code').value;
    parent.postMessage({ pluginMessage: { type: 'execute', code } }, '*');
  };

  // Listen for success/error messages from the plugin logic
  onmessage = (event) => {
    if (event.data.pluginMessage.type === 'done') {
      console.log('Execution Complete');
    }
  };
</script>
